<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Bienvenue, [Prénom] 👋</h1>
    <p class="muted">Trouvez un mentor ou aidez un pair via IFRI MentorLink.</p>
    <div class="grid cols-3">
        <div class="card">
            <h3>🎯 Matching</h3>
            <p class="muted">Découvrez les profils compatibles avec vos compétences et disponibilités.</p>
            <button class="btn">Voir mes matchs</button>
        </div>
        <div class="card">
            <h3>📋 Offres & demandes</h3>
            <p class="muted">Publiez une offre de mentorat ou cherchez de l'aide.</p>
            <button class="btn">Parcourir</button>
        </div>
        <div class="card">
            <h3>💬 Messagerie</h3>
            <p class="muted">Échangez avec vos mentors et mentorés.</p>
            <button class="btn">Ouvrir</button>
        </div>
    </div>
    <script src="/js/app.js"></script>

</body>
</html>
